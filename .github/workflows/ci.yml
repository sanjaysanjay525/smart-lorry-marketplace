name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: slm
          POSTGRES_PASSWORD: slm_dev_password
          POSTGRES_DB: smart_lorry_marketplace_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U slm -d smart_lorry_marketplace_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://slm:slm_dev_password@localhost:5432/smart_lorry_marketplace_test?schema=public
      JWT_ACCESS_SECRET: ci-access-secret-please-change-1234567890
      JWT_REFRESH_SECRET: ci-refresh-secret-please-change-0987654321

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build shared package
        run: npm run build:shared

      - name: Apply migrations
        run: npm run prisma:deploy --workspace=services/api

      - name: Generate Prisma client
        run: npm run prisma:generate --workspace=services/api

      - name: Type-check
        run: npx tsc -p services/api/tsconfig.json --noEmit

      - name: Run tests
        run: npm run test:api

      - name: Build
        run: npm run build:api

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build shared package
        run: npm run build:shared

      - name: Type-check & build
        run: npm run build:web

  ai-matching:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ai-matching
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sanity-import the app
        run: python -c "from app.main import app; print(app.title)"
