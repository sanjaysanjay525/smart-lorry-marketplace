version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: development
      WEATHER_API_KEY: ${WEATHER_API_KEY}
      CORS_ORIGIN: http://localhost:3000
    volumes:
      - ./backend/src:/app/src
    command: npm run dev
    networks:
      - weather-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend
    networks:
      - weather-network

networks:
  weather-network:
    driver: bridge
